{% extends 'base.html' %}
{% block title %}התחברות — מעקב פרויקטים{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">
          <i class="bi bi-shield-lock-fill text-primary"></i><br>
          מעקב פרויקטים סייבר
        </h4>

        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="username" class="form-label">שם משתמש</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     required autofocus placeholder="הכנס שם משתמש">
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">סיסמה</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     required placeholder="הכנס סיסמה">
            </div>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">זכור אותי</label>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> התחבר
          </button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3 small">מערכת מעקב פרויקטי גמר — סייבר</p>
  </div>
</div>
{% endblock %}
