{% extends 'base.html' %}
{% block title %}דחיית פגישה{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('teacher.meetings') }}">פגישות</a></li>
    <li class="breadcrumb-item active">דחיית פגישה</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-warning text-dark">
        <h5 class="mb-0"><i class="bi bi-calendar-range me-2"></i>דחיית פגישה</h5>
      </div>
      <div class="card-body p-4">
        <div class="alert alert-light border mb-4">
          <strong>פגישה נוכחית:</strong><br>
          {{ meeting.title }}<br>
          <span class="text-muted">
            {{ meeting.student.user.full_name }} —
            {{ meeting.scheduled_at.strftime('%d/%m/%Y %H:%M') }}
          </span>
        </div>

        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-bold">תאריך ושעה חדשים *</label>
            <input type="datetime-local" class="form-control" name="scheduled_at" required
                   value="{{ meeting.scheduled_at.strftime('%Y-%m-%dT%H:%M') }}">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">משך (דקות)</label>
            <select class="form-select" name="duration_minutes">
              <option value="15" {% if meeting.duration_minutes == 15 %}selected{% endif %}>15 דקות</option>
              <option value="30" {% if meeting.duration_minutes == 30 %}selected{% endif %}>30 דקות</option>
              <option value="45" {% if meeting.duration_minutes == 45 %}selected{% endif %}>45 דקות</option>
              <option value="60" {% if meeting.duration_minutes == 60 %}selected{% endif %}>שעה</option>
              <option value="90" {% if meeting.duration_minutes == 90 %}selected{% endif %}>שעה וחצי</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="bi bi-calendar-range"></i> דחה פגישה
            </button>
            <a href="{{ url_for('teacher.meetings') }}" class="btn btn-outline-secondary">ביטול</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
