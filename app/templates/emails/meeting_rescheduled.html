<!DOCTYPE html>
<html dir="rtl" lang="he">
<body style="font-family: Arial, sans-serif; direction: rtl; text-align: right; background: #f8f9fa; padding: 20px;">
<div style="max-width: 500px; margin: auto; background: white; border-radius: 8px; padding: 24px; border: 1px solid #dee2e6;">
  <h2 style="color: #fd7e14;">🔄 פגישה נדחתה</h2>
  <p>שלום {{ student.full_name }},</p>
  <p>הפגישה הועברה לתאריך חדש:</p>
  <table style="width:100%; border-collapse: collapse; margin: 16px 0;">
    <tr><td style="padding: 6px; font-weight: bold;">נושא:</td><td>{{ meeting.title }}</td></tr>
    <tr><td style="padding: 6px; font-weight: bold; color:#dc3545;">תאריך קודם:</td><td style="text-decoration:line-through; color:#dc3545;">{{ old_time.strftime('%d/%m/%Y %H:%M') }}</td></tr>
    <tr><td style="padding: 6px; font-weight: bold; color:#198754;">תאריך חדש:</td><td style="color:#198754;">{{ meeting.scheduled_at.strftime('%d/%m/%Y %H:%M') }}</td></tr>
    <tr><td style="padding: 6px; font-weight: bold;">משך:</td><td>{{ meeting.duration_minutes }} דקות</td></tr>
  </table>
  <p style="color: #6c757d; font-size: 12px;">מערכת מעקב פרויקטים — סייבר</p>
</div>
</body>
</html>
